<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBDC — Comunicados & Ciência</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f0;--surface:#fff;--border:#e0e0d8;--border2:#c8c8be;
  --text:#1a1a18;--text2:#555550;--text3:#888880;
  --teal:#2aaa8a;--teal-light:#e6f7f2;--teal-dark:#1a8a6a;
  --amber:#d4851a;--amber-light:#fdf3e3;
  --red:#c0392b;--red-light:#fdf0ee;
  --blue:#1a6bbf;--blue-light:#e8f2fc;
  --green:#2d8a4e;--green-light:#eaf5ee;
  --radius:10px;--radius-sm:6px;
  --shadow:0 1px 3px rgba(0,0,0,.08);
  --obdc-teal:#2aaa8a;--obdc-dark:#1a3a32;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* TOPBAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.topbar-logo{display:flex;align-items:center;gap:12px}
.topbar-logo img{height:32px;object-fit:contain}
.topbar-divider{width:1px;height:28px;background:var(--border);margin:0 4px}
.topbar-title{font-size:14px;font-weight:600;color:var(--obdc-dark)}
.topbar-subtitle{font-size:11px;color:var(--text3)}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--teal);display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* LAYOUT */
.app{max-width:860px;margin:0 auto;padding:20px 16px}

/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:4px}
.tab{flex:1;padding:8px 12px;font-size:13px;border:none;border-radius:7px;background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;font-weight:500}
.tab.active{background:var(--obdc-teal);color:#fff}
.tab:hover:not(.active){background:var(--teal-light);color:var(--teal-dark)}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:10px;box-shadow:var(--shadow)}
.card-title{font-size:14px;font-weight:600;line-height:1.4;color:var(--text)}
.card-meta{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap}
.card-body{font-size:13px;color:var(--text2);line-height:1.65;margin:10px 0}

/* BADGES & TAGS */
.badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px}
.badge-green{background:var(--green-light);color:var(--green)}
.badge-amber{background:var(--amber-light);color:var(--amber)}
.badge-blue{background:var(--blue-light);color:var(--blue)}
.badge-red{background:var(--red-light);color:var(--red)}
.badge-gray{background:#f0f0ea;color:var(--text2)}
.tag{display:inline-flex;align-items:center;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
.tag-fiscal{background:#eeecfe;color:#4a3fb5}
.tag-urgente{background:#feece8;color:#b53a1f}
.tag-obrigatorio{background:var(--red-light);color:var(--red)}
.tag-treinamento{background:var(--green-light);color:var(--green)}
.tag-informativo{background:var(--blue-light);color:var(--blue)}

/* PROGRESS */
.progress-bg{height:6px;background:#eee;border-radius:4px;overflow:hidden;margin:5px 0}
.progress-fill{height:100%;border-radius:4px;background:var(--teal);transition:width .4s}

/* BUTTONS */
.btn{padding:8px 14px;font-size:13px;font-weight:600;border:1px solid var(--border2);border-radius:var(--radius-sm);cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s;background:var(--surface);color:var(--text)}
.btn:hover{background:#f5f5f0}
.btn:active{transform:scale(.98)}
.btn-teal{background:var(--obdc-teal);color:#fff;border-color:var(--obdc-teal)}
.btn-teal:hover{background:var(--teal-dark);border-color:var(--teal-dark)}
.btn-green{background:var(--green-light);color:var(--green);border-color:#b8dcbf}
.btn-green:hover{background:#d5ead9}
.btn-red{background:var(--red-light);color:var(--red);border-color:#e5b8b3}
.btn-red:hover{background:#f5d5d2}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-lg{padding:11px 20px;font-size:14px;width:100%;justify-content:center}

/* FORMS */
.form-group{margin-bottom:14px}
.form-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block}
input[type=text],input[type=date],select,textarea{
  width:100%;font-size:13px;background:var(--surface);color:var(--text);
  border:1px solid var(--border2);border-radius:var(--radius-sm);padding:9px 12px;
  font-family:inherit;transition:border .15s
}
textarea{resize:vertical;min-height:90px;line-height:1.5}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--obdc-teal);box-shadow:0 0 0 3px rgba(42,170,138,.12)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* CHIPS */
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border:1px solid var(--border);border-radius:20px;font-size:12px;background:#fafaf6;margin:3px;cursor:pointer;transition:all .15s;user-select:none}
.chip.sel{background:var(--teal-light);color:var(--teal-dark);border-color:var(--teal);font-weight:600}
.chip:hover{border-color:var(--teal)}

/* AVATAR */
.av{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}

/* TAG SELECTOR */
.tag-selector{display:flex;flex-wrap:wrap;gap:6px}
.tag-opt{padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border2);background:#fafaf6;transition:all .15s;font-weight:500}
.tag-opt:hover{border-color:var(--obdc-teal)}
.tag-opt.sel{font-weight:700;border-color:var(--obdc-teal);background:var(--teal-light);color:var(--teal-dark)}

/* ALERTS */
.alert{padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;display:flex;align-items:center;gap:8px;margin-bottom:14px}
.alert-warn{background:var(--amber-light);color:var(--amber);border:1px solid #f5d9a0}
.alert-ok{background:var(--green-light);color:var(--green);border:1px solid #b8dcbf}
.alert-info{background:var(--blue-light);color:var(--blue);border:1px solid #b3d2f0}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:500;padding:16px}
.modal{background:var(--surface);border-radius:var(--radius);padding:22px;width:100%;max-width:580px;max-height:88vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-size:16px;font-weight:700;color:var(--obdc-dark)}
.close-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:22px;line-height:1;padding:2px}
.close-btn:hover{color:var(--text)}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.stat-label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.stat-value{font-size:24px;font-weight:700}

/* SECTION TITLE */
.sec-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:flex;align-items:center;gap:6px}

/* DIVIDER */
.divider{height:1px;background:var(--border);margin:14px 0}

/* LOGIN */
.login-wrap{min-height:calc(100vh - 56px);display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px;width:100%;max-width:400px;text-align:center;box-shadow:var(--shadow)}
.login-logo{height:48px;margin-bottom:20px}
.login-title{font-size:18px;font-weight:700;color:var(--obdc-dark);margin-bottom:6px}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:24px}

/* PANEL */
.panel{display:none}.panel.active{display:block}

/* CIENCIA ITEM */
.ci-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.ci-item:last-child{border-bottom:none}
.ci-ok{width:22px;height:22px;border-radius:50%;background:var(--green-light);color:var(--green);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.ci-pend{width:22px;height:22px;border-radius:50%;background:#f0f0ea;color:var(--text3);display:flex;align-items:center;justify-content:center;font-size:11px;border:1px solid var(--border2);flex-shrink:0}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;padding:12px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;z-index:9999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.18)}
.toast.show{opacity:1;transform:none}
.toast-ok{background:#1a5a3a;color:#b8e8cc}
.toast-err{background:#6a1a1a;color:#f0c0c0}
.toast-info{background:#1a3a6a;color:#b0d0f0}

/* USER SELECT */
.user-sel-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:14px}
.user-sel-wrap label{font-size:12px;color:var(--text3);font-weight:600;white-space:nowrap}
.user-sel-wrap select{flex:1;border:none;padding:0;font-size:13px;background:transparent;font-weight:600;color:var(--text)}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap i{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;pointer-events:none}
.search-wrap input{padding-left:34px}

/* EMPTY */
.empty{padding:36px 20px;text-align:center;color:var(--text3);font-size:13px}
.empty i{font-size:36px;display:block;margin-bottom:10px;color:var(--border2)}

/* ADMIN BADGE */
.admin-badge{background:var(--obdc-teal);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;letter-spacing:.04em}

/* LINK SHARE */
.share-box{background:var(--teal-light);border:1px solid var(--teal);border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:16px}
.share-url{flex:1;font-size:12px;color:var(--teal-dark);font-family:monospace;word-break:break-all;font-weight:600}

@media(max-width:480px){
  .form-row{grid-template-columns:1fr}
  .tabs{gap:2px}
  .tab{font-size:12px;padding:7px 6px}
}
</style>
</head>

<div id="toast" class="toast"></div>

<script>
const ADMINS = ['larissap','leilane','geovana'];

const TEAM = [
  {id:'luciana',    nome:'Luciana'},
  {id:'fernanda',   nome:'Fernanda'},
  {id:'gabmachado', nome:'Gabriela Machado'},
  {id:'gabcardoso', nome:'Gabriella Cardoso'},
  {id:'kelle',      nome:'Kelle'},
  {id:'jesdriely',  nome:'Jessica Driely'},
  {id:'jescardoso', nome:'Jessica Cardoso'},
  {id:'marialuiza', nome:'Maria Luiza'},
  {id:'estela',     nome:'Estela'},
  {id:'analaura',   nome:'Ana Laura'},
  {id:'gabryel',    nome:'Gabryel'},
  {id:'gaspar',     nome:'Gaspar'},
  {id:'jeferson',   nome:'Jeferson'},
  {id:'leilane',    nome:'Leilane'},
  {id:'geovana',    nome:'Geovana'},
  {id:'larissap',   nome:'Larissa Pacheco'},
  {id:'larissab',   nome:'Larissa Bernardes'},
  {id:'bianca',     nome:'Bianca'},
  {id:'lara',       nome:'Lara'},
  {id:'guilherme',  nome:'Guilherme'},
  {id:'sara',       nome:'Sara'},
  {id:'lauryanna',  nome:'Lauryanna'},
  {id:'lauanny',    nome:'Lauanny'},
  {id:'rafael',     nome:'Rafael'},
  {id:'thalita',    nome:'Thalita'},
  {id:'felipeneves',nome:'Felipe Neves'},
  {id:'douglas',    nome:'Douglas'},
];

const BG=['#E6F1FB','#E1F5EE','#EEEDFE','#FAEEDA','#FBEAF0','#EAF3DE','#FAECE7','#F1EFE8','#E6F1FB'];
const FG=['#185FA5','#0F6E56','#3C3489','#854F0B','#993556','#3B6D11','#993C1D','#5F5E5A','#185FA5'];
function avStyle(i){const x=i%BG.length;return `background:${BG[x]};color:${FG[x]}`;}
function initials(n){const p=n.trim().split(' ');return p.length>=2?p[0][0]+p[p.length-1][0]:n.slice(0,2).toUpperCase();}
TEAM.forEach((m,i)=>{m.av=initials(m.nome);m.avStyle=avStyle(i);});

let comunicados=[];
let currentUser=null;
let isAdmin=false;
let selectedTag='';
let selectedDests=new Set(TEAM.map(c=>c.id));

// ---- STORAGE ----
async function load(){
  try{const r=await window.storage.get('obdc_comunicados');comunicados=r?JSON.parse(r.value):[];}catch(e){comunicados=[];}
}
async function save(){
  try{await window.storage.set('obdc_comunicados',JSON.stringify(comunicados));}catch(e){}
}

// ---- LOGIN / LOGOUT ----
function buildLoginSelect(){
  const sel=document.getElementById('login-sel');
  TEAM.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.nome+(ADMINS.includes(c.id)?' ★':'');sel.appendChild(o);});
}

function doLogin(){
  const uid=document.getElementById('login-sel').value;
  if(!uid){toast('Selecione seu nome','err');return;}
  currentUser=TEAM.find(t=>t.id===uid);
  isAdmin=ADMINS.includes(uid);
  sessionStorage.setItem('obdc_user',uid);
  showApp();
}

function doLogout(){
  sessionStorage.removeItem('obdc_user');
  currentUser=null;isAdmin=false;
  document.getElementById('main-app').style.display='none';
  document.getElementById('login-wrap').style.display='flex';
  document.getElementById('login-sel').value='';
}

function showApp(){
  document.getElementById('login-wrap').style.display='none';
  document.getElementById('main-app').style.display='block';
  const info=document.getElementById('user-info');
  info.innerHTML=`${currentUser.nome} ${isAdmin?'<span class="admin-badge">ADMIN</span>':''}`;
  document.getElementById('admin-controls').style.display=isAdmin?'block':'none';
  document.getElementById('colab-header').style.display=isAdmin?'none':'block';
  // tabs: relatório só para admin
  document.getElementById('tab-relatorio').style.display=isAdmin?'flex':'none';
  setShareUrl();
  renderComunicados();
  renderStats();
}

function setShareUrl(){
  const url=window.location.href.split('?')[0];
  document.getElementById('share-url-txt').textContent=url;
}

function copyLink(){
  const url=window.location.href.split('?')[0];
  navigator.clipboard.writeText(url).then(()=>toast('Link copiado!','ok')).catch(()=>{
    const t=document.getElementById('share-url-txt');
    const r=document.createRange();r.selectNode(t);
    window.getSelection().removeAllRanges();window.getSelection().addRange(r);
    document.execCommand('copy');
    window.getSelection().removeAllRanges();
    toast('Link copiado!','ok');
  });
}

// ---- RENDER ----
function tagCls(t){return{Urgente:'tag-urgente',Informativo:'tag-informativo',Obrigatório:'tag-obrigatorio',Treinamento:'tag-treinamento',Fiscal:'tag-fiscal'}[t]||'tag-informativo';}
function fmtD(iso){if(!iso)return'—';return new Date(iso+'T12:00:00').toLocaleDateString('pt-BR');}
function fmtDT(iso){if(!iso)return'—';const d=new Date(iso);return d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}
function pct(c){return c.dests.length?Math.round(c.ciencias.length/c.dests.length*100):0;}

function renderStats(){
  const pend=comunicados.filter(c=>c.ciencias.length<c.dests.length).length;
  const done=comunicados.filter(c=>c.dests.length&&c.ciencias.length>=c.dests.length).length;
  document.getElementById('stats-area').innerHTML=isAdmin?`
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Publicados</div><div class="stat-value">${comunicados.length}</div></div>
      <div class="stat-card"><div class="stat-label">Com pendência</div><div class="stat-value" style="color:var(--amber)">${pend}</div></div>
      <div class="stat-card"><div class="stat-label">100% concluídos</div><div class="stat-value" style="color:var(--green)">${done}</div></div>
      <div class="stat-card"><div class="stat-label">Colaboradores</div><div class="stat-value">${TEAM.length}</div></div>
    </div>`:'';
}

function renderComunicados(){
  renderStats();
  const el=document.getElementById('lista-comunicados');
  const uid=currentUser?.id;
  const lista=isAdmin?comunicados.slice().reverse():comunicados.filter(c=>c.dests.includes(uid)).slice().reverse();
  if(!lista.length){
    el.innerHTML='<div class="empty"><i class="ti ti-speakerphone"></i>'+(isAdmin?'Nenhum comunicado. Clique em <strong>Novo comunicado</strong> para começar.':'Nenhum comunicado para você no momento.')+'</div>';
    return;
  }
  if(!isAdmin){
    const pend=lista.filter(c=>!c.ciencias.find(ci=>ci.id===uid)).length;
    el.innerHTML='';
    const alertEl=document.createElement('div');
    alertEl.className='alert '+(pend>0?'alert-warn':'alert-ok');
    alertEl.innerHTML=pend>0
      ?`<i class="ti ti-alert-circle"></i>Você tem <strong>${pend}</strong> comunicado${pend>1?'s':''} aguardando ciência.`
      :`<i class="ti ti-circle-check"></i>Você está em dia! Todas as ciências foram confirmadas.`;
    el.appendChild(alertEl);
  } else {
    el.innerHTML='';
  }
  lista.forEach(c=>{
    const ok=isAdmin?null:c.ciencias.find(ci=>ci.id===uid);
    const p=pct(c);
    const faltam=c.dests.filter(d=>!c.ciencias.find(ci=>ci.id===d)).map(d=>TEAM.find(t=>t.id===d)?.nome).filter(Boolean);
    const div=document.createElement('div');
    div.className='card';
    if(!isAdmin&&!ok) div.style.borderLeft='3px solid var(--amber)';
    div.innerHTML=`
      <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;flex-wrap:wrap">
        ${c.tag?`<span class="tag ${tagCls(c.tag)}">${c.tag}</span>`:''}
        <span class="card-title" style="flex:1">${c.titulo}</span>
        ${!isAdmin?(ok?'<span class="badge badge-green"><i class="ti ti-check" style="font-size:11px"></i> Ciência dada</span>':'<span class="badge badge-amber"><i class="ti ti-clock" style="font-size:11px"></i> Pendente</span>'):''}
      </div>
      <div class="card-meta" style="margin-bottom:10px">
        <i class="ti ti-calendar" style="font-size:12px"></i>${fmtDT(c.createdAt)}
        ${c.prazo?`· Prazo: <strong>${fmtD(c.prazo)}</strong>`:''}
        ${isAdmin?`<span class="badge badge-gray">${c.ciencias.length}/${c.dests.length} ciências</span>`:''}
      </div>
      <div class="card-body">${c.corpo}</div>
      ${isAdmin?`
        <div style="display:flex;align-items:center;gap:12px;padding-top:12px;border-top:1px solid var(--border)">
          <div style="flex:1">
            <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:3px"><span>Ciências recebidas</span><span>${p}%</span></div>
            <div class="progress-bg"><div class="progress-fill" style="width:${p}%"></div></div>
            ${faltam.length?`<div style="font-size:11px;color:var(--amber);margin-top:4px"><i class="ti ti-clock"></i> Aguardando (${faltam.length}): ${faltam.slice(0,5).join(', ')}${faltam.length>5?` e mais ${faltam.length-5}`:''}</div>`:`<div style="font-size:11px;color:var(--green);margin-top:4px"><i class="ti ti-check"></i> Todos confirmaram</div>`}
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0">
            <button class="btn btn-sm" onclick="verDetalhes('${c.id}')"><i class="ti ti-list"></i> Detalhes</button>
            <button class="btn btn-red btn-sm" onclick="excluir('${c.id}')"><i class="ti ti-trash"></i></button>
          </div>
        </div>`
      :ok?`<div style="font-size:12px;color:var(--green);padding-top:10px;border-top:1px solid var(--border)"><i class="ti ti-check-circle"></i> Ciência registrada em ${fmtDT(ok.quando)}</div>`
        :`<div style="padding-top:10px;border-top:1px solid var(--border)">
            <button class="btn btn-green" onclick="darCiencia('${c.id}')"><i class="ti ti-check"></i> Confirmar leitura e entendimento</button>
          </div>`
      }`;
    el.appendChild(div);
  });
}

function renderRelatorio(){
  const q=(document.getElementById('rel-search')?.value||'').toLowerCase();
  if(!comunicados.length){
    document.getElementById('stats-rel').innerHTML='';
    document.getElementById('rel-lista').innerHTML='<div class="empty"><i class="ti ti-chart-bar"></i>Nenhum dado ainda.</div>';
    return;
  }
  const total=comunicados.reduce((s,c)=>s+c.dests.length,0);
  const dadas=comunicados.reduce((s,c)=>s+c.ciencias.length,0);
  const geral=total?Math.round(dadas/total*100):0;
  document.getElementById('stats-rel').innerHTML=`
    <div class="stat-card"><div class="stat-label">Ciências esperadas</div><div class="stat-value">${total}</div></div>
    <div class="stat-card"><div class="stat-label">Recebidas</div><div class="stat-value" style="color:var(--green)">${dadas}</div></div>
    <div class="stat-card"><div class="stat-label">Pendentes</div><div class="stat-value" style="color:var(--amber)">${total-dadas}</div></div>
    <div class="stat-card"><div class="stat-label">Conformidade</div><div class="stat-value">${geral}%</div></div>
  `;
  const stats=TEAM.filter(c=>!q||c.nome.toLowerCase().includes(q))
    .map(c=>{
      const meus=comunicados.filter(cm=>cm.dests.includes(c.id));
      const deu=meus.filter(cm=>cm.ciencias.find(ci=>ci.id===c.id)).length;
      const p=meus.length?Math.round(deu/meus.length*100):0;
      return{...c,total:meus.length,deu,p};
    }).sort((a,b)=>a.p-b.p);
  document.getElementById('rel-lista').innerHTML=`
    <div class="sec-title"><i class="ti ti-users"></i> Situação por colaborador</div>
    ${stats.map(c=>`<div class="card" style="padding:12px 16px;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="av" style="${c.avStyle}">${c.av}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600">${c.nome}${ADMINS.includes(c.id)?' <span class="admin-badge">ADMIN</span>':''}</div>
          <div class="progress-bg" style="margin-top:5px;margin-bottom:0"><div class="progress-fill" style="width:${c.p}%;background:${c.p===100?'var(--teal)':c.p>50?'var(--amber)':'var(--red)'}"></div></div>
        </div>
        <div style="text-align:right;flex-shrink:0;min-width:52px">
          <div style="font-size:13px;font-weight:700">${c.deu}/${c.total}</div>
          <div style="font-size:11px;color:var(--text3)">${c.p}%</div>
        </div>
        ${c.p===100?`<span class="badge badge-green"><i class="ti ti-check" style="font-size:11px"></i></span>`:`<span class="badge badge-amber" style="flex-shrink:0">${c.total-c.deu} pend.</span>`}
      </div>
    </div>`).join('')}`;
}

// ---- MODAL NOVO COMUNICADO ----
function buildChips(){
  let html='';
  TEAM.forEach(c=>{
    html+=`<span class="chip${selectedDests.has(c.id)?' sel':''}" data-id="${c.id}" onclick="toggleChip(this,'${c.id}')">
      <span class="av" style="${c.avStyle};width:18px;height:18px;font-size:8px">${c.av}</span>${c.nome}
    </span>`;
  });
  document.getElementById('chip-container').innerHTML=html;
}
function toggleChip(el,id){
  if(selectedDests.has(id))selectedDests.delete(id);else selectedDests.add(id);
  el.classList.toggle('sel',selectedDests.has(id));
}
function selAll(){selectedDests=new Set(TEAM.map(c=>c.id));buildChips();}
function selNone(){selectedDests.clear();buildChips();}
function selTag(el){
  document.querySelectorAll('.tag-opt').forEach(t=>t.classList.remove('sel'));
  selectedTag=selectedTag===el.dataset.tag?'':el.dataset.tag;
  if(selectedTag)el.classList.add('sel');
}

function openModal(){
  selectedTag='';selectedDests=new Set(TEAM.map(c=>c.id));
  document.getElementById('modal-inner').innerHTML=`
    <div class="modal-header">
      <span class="modal-title">Novo comunicado</span>
      <button class="close-btn" onclick="closeModal(null,true)">&times;</button>
    </div>
    <div class="form-group">
      <label class="form-label">Título *</label>
      <input type="text" id="f-titulo" placeholder="Ex: Orientação PIS/COFINS — LC 224/2025">
    </div>
    <div class="form-group">
      <label class="form-label">Conteúdo *</label>
      <textarea id="f-corpo" rows="5" placeholder="Escreva o comunicado, orientação ou instrução aqui..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Categoria</label>
        <div class="tag-selector" id="tag-sel">
          <span class="tag-opt" data-tag="Fiscal" onclick="selTag(this)">Fiscal</span>
          <span class="tag-opt" data-tag="Urgente" onclick="selTag(this)">Urgente</span>
          <span class="tag-opt" data-tag="Obrigatório" onclick="selTag(this)">Obrigatório</span>
          <span class="tag-opt" data-tag="Treinamento" onclick="selTag(this)">Treinamento</span>
          <span class="tag-opt" data-tag="Informativo" onclick="selTag(this)">Informativo</span>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Prazo para ciência</label>
        <input type="date" id="f-prazo">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Destinatários</label>
      <div style="display:flex;gap:6px;margin-bottom:8px">
        <button class="btn btn-sm" onclick="selAll()"><i class="ti ti-users"></i> Todos</button>
        <button class="btn btn-sm" onclick="selNone()">Limpar</button>
      </div>
      <div id="chip-container" style="display:flex;flex-wrap:wrap"></div>
    </div>
    <div class="divider"></div>
    <div style="display:flex;justify-content:flex-end;gap:8px">
      <button class="btn" onclick="closeModal(null,true)">Cancelar</button>
      <button class="btn btn-teal" onclick="publicar()"><i class="ti ti-send"></i> Publicar</button>
    </div>`;
  buildChips();
  document.getElementById('modal').style.display='block';
  setTimeout(()=>document.getElementById('f-titulo')?.focus(),60);
}

function closeModal(e,force){
  if(force||(e&&e.target.classList.contains('overlay'))){
    document.getElementById('modal').style.display='none';
  }
}

async function publicar(){
  const titulo=(document.getElementById('f-titulo')?.value||'').trim();
  const corpo=(document.getElementById('f-corpo')?.value||'').trim();
  if(!titulo||!corpo){toast('Preencha título e conteúdo','err');return;}
  if(!selectedDests.size){toast('Selecione ao menos um destinatário','err');return;}
  comunicados.push({
    id:'c'+Date.now(),titulo,corpo,
    tag:selectedTag,
    prazo:document.getElementById('f-prazo')?.value||'',
    dests:[...selectedDests],
    ciencias:[],
    createdAt:new Date().toISOString()
  });
  await save();
  closeModal(null,true);
  renderComunicados();
  toast('Comunicado publicado com sucesso!','ok');
}

async function darCiencia(cid){
  const c=comunicados.find(x=>x.id===cid);
  if(!c||c.ciencias.find(ci=>ci.id===currentUser.id))return;
  c.ciencias.push({id:currentUser.id,quando:new Date().toISOString()});
  await save();
  renderComunicados();
  toast('Ciência registrada!','ok');
}

async function excluir(cid){
  if(!confirm('Excluir este comunicado permanentemente?'))return;
  comunicados=comunicados.filter(c=>c.id!==cid);
  await save();
  renderComunicados();
  toast('Comunicado removido','ok');
}

function verDetalhes(cid){
  const c=comunicados.find(x=>x.id===cid);
  if(!c)return;
  const items=c.dests.map(d=>{
    const col=TEAM.find(t=>t.id===d);
    const ci=c.ciencias.find(x=>x.id===d);
    return`<div class="ci-item">
      <div class="${ci?'ci-ok':'ci-pend'}">${ci?'✓':'○'}</div>
      <div class="av" style="${col?.avStyle||''};width:26px;height:26px;font-size:10px">${col?.av||'?'}</div>
      <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500">${col?.nome||d}</div></div>
      <div style="font-size:11px;color:var(--text3);flex-shrink:0">${ci?fmtDT(ci.quando):'<span style="color:var(--amber)">pendente</span>'}</div>
    </div>`;
  }).join('');
  document.getElementById('modal-inner').innerHTML=`
    <div class="modal-header">
      <span class="modal-title">${c.titulo}</span>
      <button class="close-btn" onclick="closeModal(null,true)">&times;</button>
    </div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:12px">${c.ciencias.length} de ${c.dests.length} ciências · ${pct(c)}% concluído</div>
    <div>${items}</div>
    <div class="divider"></div>
    <div style="display:flex;justify-content:flex-end">
      <button class="btn" onclick="closeModal(null,true)">Fechar</button>
    </div>`;
  document.getElementById('modal').style.display='block';
}

function switchTab(t){
  ['comunicados','relatorio'].forEach(x=>{
    document.getElementById('panel-'+x).classList.toggle('active',x===t);
    document.getElementById('tab-'+x).classList.toggle('active',x===t);
  });
  if(t==='relatorio')renderRelatorio();
}

function toast(msg,type){
  const el=document.getElementById('toast');
  el.className='toast toast-'+(type==='ok'?'ok':type==='info'?'info':'err')+' show';
  el.innerHTML=`<i class="ti ti-${type==='ok'?'check':type==='info'?'info-circle':'alert-circle'}"></i>${msg}`;
  setTimeout(()=>el.classList.remove('show'),2800);
}

// ---- INIT ----
async function init(){
  await load();
  buildLoginSelect();
  const saved=sessionStorage.getItem('obdc_user');
  if(saved){
    const u=TEAM.find(t=>t.id===saved);
    if(u){
      currentUser=u;isAdmin=ADMINS.includes(u.id);
      document.getElementById('login-sel').value=u.id;
      showApp();return;
    }
  }
  document.getElementById('login-wrap').style.display='flex';
}

init();
</script>
</body>
</html>
